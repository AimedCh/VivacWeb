<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Token</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .container {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
        }
        button {
            background: #2d7a4a;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #1f5a35;
        }
        .output {
            background: white;
            padding: 15px;
            margin-top: 15px;
            border-radius: 4px;
            border: 1px solid #ddd;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .success {
            color: green;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test de Token</h1>
        
        <button onclick="testToken()">1. Verificar Token en localStorage</button>
        <button onclick="decodeToken()">2. Decodificar Token</button>
        <button onclick="testVivacEndpoint()">3. Probar Endpoint /vivacs</button>
        <button onclick="clearOutput()">Limpiar</button>
        
        <div id="output" class="output"></div>
    </div>

    <script>
        const output = document.getElementById('output');

        function log(message, isError = false) {
            const className = isError ? 'error' : 'success';
            output.innerHTML += `<div class="${className}">${message}</div>`;
            console.log(message);
        }

        function clearOutput() {
            output.innerHTML = '';
        }

        function testToken() {
            clearOutput();
            log('🔍 Verificando token en localStorage...\n');
            
            const token = localStorage.getItem('vivacweb_token');
            const user = localStorage.getItem('vivacweb_user');
            
            if (!token) {
                log('❌ No hay token en localStorage', true);
                return;
            }
            
            log('✅ Token encontrado');
            log(`Token (primeros 50 caracteres): ${token.substring(0, 50)}...`);
            log(`Longitud del token: ${token.length}`);
            log(`Partes del JWT: ${token.split('.').length}`);
            
            if (user) {
                log(`\n✅ Usuario encontrado: ${user}`);
            }
        }

        function decodeToken() {
            clearOutput();
            log('🔓 Decodificando token...\n');
            
            const token = localStorage.getItem('vivacweb_token');
            if (!token) {
                log('❌ No hay token', true);
                return;
            }
            
            try {
                const parts = token.split('.');
                if (parts.length !== 3) {
                    log('❌ Token inválido (no tiene 3 partes)', true);
                    return;
                }
                
                // Decodificar header
                const header = JSON.parse(atob(parts[0]));
                log('📋 Header:');
                log(JSON.stringify(header, null, 2));
                
                // Decodificar payload
                const payload = JSON.parse(atob(parts[1]));
                log('\n📦 Payload:');
                log(JSON.stringify(payload, null, 2));
                
                // Verificar expiración
                if (payload.exp) {
                    const expirationDate = new Date(payload.exp * 1000);
                    const now = new Date();
                    log(`\n⏰ Expiración: ${expirationDate.toLocaleString()}`);
                    log(`Ahora: ${now.toLocaleString()}`);
                    
                    if (now > expirationDate) {
                        log('❌ Token expirado', true);
                    } else {
                        log('✅ Token válido');
                    }
                }
            } catch (error) {
                log(`❌ Error al decodificar: ${error.message}`, true);
            }
        }

        async function testVivacEndpoint() {
            clearOutput();
            log('🧪 Probando endpoint /vivacs...\n');
            
            const token = localStorage.getItem('vivacweb_token');
            if (!token) {
                log('❌ No hay token', true);
                return;
            }
            
            const testData = {
                name: 'Test Vivac',
                description: 'Test description',
                latitude: 40.4637,
                longitude: -3.7492,
                elevation: 500,
                accessDifficulty: 'EASY',
                environment: ['PATH'],
                terrainType: 'GRASS',
                petFriendly: false,
                photoUrls: []
            };
            
            try {
                log('📤 Enviando solicitud a http://localhost:3001/vivacs');
                log(`📋 Datos: ${JSON.stringify(testData, null, 2)}\n`);
                
                const response = await fetch('http://localhost:3001/vivacs', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(testData)
                });
                
                log(`📥 Status: ${response.status}`);
                const data = await response.json();
                log(`📥 Respuesta: ${JSON.stringify(data, null, 2)}`);
                
                if (response.ok) {
                    log('✅ Solicitud exitosa');
                } else {
                    log(`❌ Error: ${data.message || 'Error desconocido'}`, true);
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, true);
            }
        }
    </script>
</body>
</html>
