<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <!-- WILD text -->
  <text x="10" y="80" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#1a5a3a" letter-spacing="8">WILD</text>
  
  <!-- SPOT text -->
  <text x="10" y="150" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#1a5a3a" letter-spacing="8">SPOT</text>
  
  <!-- Compass circle -->
  <circle cx="420" cy="100" r="45" fill="none" stroke="#1a5a3a" stroke-width="3"/>
  
  <!-- Compass needle (N-S) -->
  <line x1="420" y1="60" x2="420" y2="140" stroke="#1a5a3a" stroke-width="2"/>
  
  <!-- Compass needle (E-W) -->
  <line x1="380" y1="100" x2="460" y2="100" stroke="#1a5a3a" stroke-width="2"/>
  
  <!-- Compass point (North) -->
  <polygon points="420,55 425,65 415,65" fill="#1a5a3a"/>
  
  <!-- Compass center dot -->
  <circle cx="420" cy="100" r="4" fill="#1a5a3a"/>
</svg>

