<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VivacWeb - Perfil</title>
    <link rel="stylesheet" href="dashboard-styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-header {
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2d7a4a, #1f5a35);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            flex-shrink: 0;
        }

        .profile-info h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .profile-info p {
            color: #666;
            margin-bottom: 16px;
        }

        .profile-stats {
            display: flex;
            gap: 32px;
            margin-top: 16px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #2d7a4a;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .edit-btn {
            padding: 10px 20px;
            background-color: #2d7a4a;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .edit-btn:hover {
            background-color: #1f5a35;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #1a1a1a;
        }

        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .favorite-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .favorite-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .favorite-item-info {
            padding: 12px;
        }

        .favorite-item-info h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .favorite-item-info p {
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-content">
                <div class="logo">
                    <span class="star">★</span>
                    <span class="logo-text">LOGO</span>
                </div>
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </header>

        <!-- Sidebar Menu -->
        <aside class="sidebar" id="sidebar">
            <button class="close-menu" id="closeMenu">
                <i class="fas fa-times"></i>
            </button>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Inicio</span>
                </a>
                <a href="explorar.html" class="nav-item">
                    <i class="fas fa-globe"></i>
                    <span>Explorar</span>
                </a>
                <a href="crear-vivac.html" class="nav-item">
                    <i class="fas fa-flag"></i>
                    <span>Crear vivac</span>
                </a>
                <a href="comunidad.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Comunidad</span>
                </a>
                <a href="perfil.html" class="nav-item active">
                    <i class="fas fa-user-circle"></i>
                    <span>Perfil</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="settings.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
                <button class="nav-item logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Log out</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <div class="profile-header">
                <div class="profile-avatar">👤</div>
                <div class="profile-info">
                    <h1 id="userName">Usuario</h1>
                    <p id="userEmail">usuario@example.com</p>
                    <div class="profile-stats">
                        <div class="stat">
                            <div class="stat-number">12</div>
                            <div class="stat-label">Vivacs creados</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number">45</div>
                            <div class="stat-label">Favoritos</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number">128</div>
                            <div class="stat-label">Seguidores</div>
                        </div>
                    </div>
                </div>
                <button class="edit-btn">Editar perfil</button>
            </div>

            <h2 class="section-title">Mis favoritos</h2>
            <div class="favorites-grid" id="favoritesGrid">
                <p style="grid-column: 1/-1; text-align: center; color: #999;">Cargando favoritos...</p>
            </div>
        </main>
    </div>

    <script src="dashboard-script.js"></script>
    <script>
        window.addEventListener('load', function() {
            const user = JSON.parse(localStorage.getItem('vivacweb_user') || '{}');
            document.getElementById('userName').textContent = user.name || 'Usuario';
            document.getElementById('userEmail').textContent = user.email || 'usuario@example.com';
        });
    </script>
</body>
</html>
