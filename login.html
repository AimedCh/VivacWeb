<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VivacWeb - Iniciar sesión</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <!-- Google Sign-In Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <!-- Logo -->
        <div class="logo">
          <img src="logo.svg" alt="Wild Spot" class="logo-img">
        </div>

        <!-- Headline -->
        <h1 class="headline">Bienvenido a VivacWeb</h1>
        <p class="subheadline">
          Descubre nuevas rutas, comparte tus aventuras y vive la naturaleza al
          máximo.
        </p>

        <!-- Login Form -->
        <div class="login-form">
          <h2 class="form-title">Iniciar sesión</h2>

          <form id="loginForm" novalidate>
            <!-- Email Field -->
            <div class="form-group">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="maria.diaz@gmail.com"
                required
              />
            </div>

            <!-- Password Field -->
            <div class="form-group">
              <label for="password">Contraseña </label>
              <div class="password-input-wrapper">
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Mínimo 8 caracteres"
                  required
                  minlength="8"
                />
                <button
                  type="button"
                  class="toggle-password"
                  id="togglePassword"
                >
                  <svg
                    width="20"
                    height="20"
                    viewBox="0 0 20 20"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <path
                      d="M10 4C4.5 4 2 10 2 10s2.5 6 8 6 8-6 8-6-2.5-6-8-6z"
                      stroke="currentColor"
                      stroke-width="1.5"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <circle
                      cx="10"
                      cy="10"
                      r="2.5"
                      stroke="currentColor"
                      stroke-width="1.5"
                    />
                    <line
                      x1="3"
                      y1="3"
                      x2="17"
                      y2="17"
                      stroke="currentColor"
                      stroke-width="1.5"
                      stroke-linecap="round"
                      class="eye-slash"
                    />
                  </svg>
                </button>
              </div>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage">
              * Email o contraseña incorrectos
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-submit">Acceder</button>

            <!-- Forgot Password Link -->
            <a href="forgot-password.html" class="forgot-password"
              >¿Has olvidado tu contraseña?</a
            >

            <!-- Divider -->
            <div class="divider">
              <span class="divider-line"></span>
              <span class="divider-text">o</span>
              <span class="divider-line"></span>
            </div>

            <!-- Google Sign In Button -->
            <button type="button" class="btn-google" id="googleSignInBtn">
              <svg
                width="20"
                height="20"
                viewBox="0 0 20 20"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M19.8 10.2273C19.8 9.51819 19.7364 8.83637 19.6182 8.18182H10V12.05H15.4818C15.2364 13.3 14.5091 14.3591 13.4182 15.0682V17.5773H16.7364C18.7091 15.8364 19.8 13.2727 19.8 10.2273Z"
                  fill="#4285F4"
                />
                <path
                  d="M10 20C12.7 20 14.9636 19.1045 16.7364 17.5773L13.4182 15.0682C12.5091 15.6682 11.3455 16.0227 10 16.0227C7.39545 16.0227 5.19091 14.2636 4.40455 11.9H0.963636V14.4909C2.72727 17.9591 6.09091 20 10 20Z"
                  fill="#34A853"
                />
                <path
                  d="M4.40455 11.9C4.19545 11.3 4.07727 10.6591 4.07727 10C4.07727 9.34091 4.19545 8.7 4.40455 8.1V5.50909H0.963636C0.35 6.71818 0 8.11818 0 10C0 11.8818 0.35 13.2818 0.963636 14.4909L4.40455 11.9Z"
                  fill="#FBBC04"
                />
                <path
                  d="M10 3.97727C11.4682 3.97727 12.7864 4.48182 13.8227 5.47273L16.7409 2.60455C14.9591 0.890909 12.6955 0 10 0C6.09091 0 2.72727 2.04091 0.963636 5.50909L4.40455 8.1C5.19091 5.73636 7.39545 3.97727 10 3.97727Z"
                  fill="#EA4335"
                />
              </svg>
              <span>Continuar con Google</span>
            </button>

            <!-- Register Link -->
            <p class="register-link">
              ¿Aún no tienes una cuenta? <a href="#">Regístrate</a>
            </p>
          </form>
        </div>
      </div>
    </div>

    <script>
      // Usar proxy local en desarrollo, backend en producción
      const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? "http://localhost:3001"
        : "https://vivac-backend-production.up.railway.app";

      // Función para validar email
      function isValidEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
      }

      const loginForm = document.getElementById("loginForm");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const errorMessage = document.getElementById("errorMessage");
      const togglePassword = document.getElementById("togglePassword");
      const registerLink = document.querySelector(".register-link a");
      const forgotPasswordLink = document.querySelector(".forgot-password");
      const googleSignInBtn = document.getElementById("googleSignInBtn");

      // Toggle password visibility
      togglePassword.addEventListener("click", function () {
        const type =
          passwordInput.getAttribute("type") === "password"
            ? "text"
            : "password";
        passwordInput.setAttribute("type", type);
        this.classList.toggle("show");
      });

      // Form submission
      loginForm.addEventListener("submit", async function (e) {
        e.preventDefault();

        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        // Reset error state
        emailInput.classList.remove("error");
        passwordInput.classList.remove("error");
        errorMessage.classList.remove("show");

        let hasError = false;

        if (!email || !isValidEmail(email)) {
          emailInput.classList.add("error");
          hasError = true;
        }

        if (!password) {
          passwordInput.classList.add("error");
          hasError = true;
        }

        if (hasError) {
          errorMessage.classList.add("show");
          return;
        }

        // Login con backend
        try {
          const response = await fetch(`${API_URL}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();

          // El backend devuelve accessToken si es exitoso, o un mensaje de error
          if (data.accessToken) {
            // Guardar token y usuario
            localStorage.setItem("vivacweb_token", data.accessToken);
            localStorage.setItem("vivacweb_user", JSON.stringify(data.user));

            alert("¡Bienvenido " + data.user.userName + "!");
            window.location.href = "dashboard.html";
          } else if (data.message) {
            emailInput.classList.add("error");
            passwordInput.classList.add("error");
            errorMessage.textContent = "* " + data.message;
            errorMessage.classList.add("show");
          } else {
            emailInput.classList.add("error");
            passwordInput.classList.add("error");
            errorMessage.textContent = "* Credenciales inválidas";
            errorMessage.classList.add("show");
          }
        } catch (error) {
          console.error("Error:", error);
          errorMessage.textContent =
            "* Error de conexión. Verifica que el servidor esté corriendo.";
          errorMessage.classList.add("show");
        }
      });

      // Register link
      registerLink.addEventListener("click", function (e) {
        e.preventDefault();
        window.location.href = "register.html";
      });

      // Forgot password link
      forgotPasswordLink.addEventListener("click", function (e) {
        e.preventDefault();
        window.location.href = "forgot-password.html";
      });

      // Remove error on input
      emailInput.addEventListener("input", function () {
        if (this.classList.contains("error")) {
          this.classList.remove("error");
          errorMessage.classList.remove("show");
        }
      });

      passwordInput.addEventListener("input", function () {
        if (this.classList.contains("error")) {
          this.classList.remove("error");
          errorMessage.classList.remove("show");
        }
      });

      // ============================================
      // GOOGLE SIGN IN - REAL IMPLEMENTATION
      // ============================================

      // Callback function for Google Sign-In
      async function handleCredentialResponse(response) {
        try {
          // Decode JWT token
          const base64Url = response.credential.split(".")[1];
          const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
          const jsonPayload = decodeURIComponent(
            atob(base64)
              .split("")
              .map(function (c) {
                return "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2);
              })
              .join("")
          );

          const userData = JSON.parse(jsonPayload);
          console.log("📧 Datos de Google:", userData);

          // Primero intentar registrar el usuario si no existe
          console.log("📝 Intentando registrar usuario...");
          try {
            const registerResponse = await fetch(`${API_URL}/auth/register`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                userName: userData.name,
                email: userData.email,
                password: "google_" + userData.sub, // Contraseña temporal basada en Google ID
              }),
            });

            const registerData = await registerResponse.json();
            console.log("✅ Respuesta de registro:", registerData);

            // Si el registro fue exitoso, usar directamente el token
            if (registerData.accessToken) {
              console.log("✅ Usuario registrado exitosamente con Google");
              localStorage.setItem("vivacweb_token", registerData.accessToken);
              localStorage.setItem("vivacweb_user", JSON.stringify(registerData.user));
              alert("¡Bienvenido " + registerData.user.userName + "!");
              window.location.href = "dashboard.html";
              return;
            }
          } catch (e) {
            console.log("⚠️ Error en registro:", e.message);
          }

          // Si el registro falló o el usuario ya existe, intentar login
          console.log("🔐 Intentando login con Google...");
          const loginResponse = await fetch(`${API_URL}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: userData.email,
              password: "google_" + userData.sub,
            }),
          });

          const loginData = await loginResponse.json();
          console.log("✅ Respuesta de login:", loginData);

          // El backend devuelve accessToken si es exitoso
          if (loginData.accessToken) {
            // Guardar datos del usuario en localStorage
            localStorage.setItem("vivacweb_token", loginData.accessToken);
            localStorage.setItem(
              "vivacweb_user",
              JSON.stringify(loginData.user)
            );

            // Mostrar mensaje de éxito
            alert("¡Login con Google exitoso! Bienvenido " + loginData.user.userName);

            // Redirigir al dashboard
            window.location.href = "dashboard.html";
          } else if (loginData.message) {
            console.error("❌ Error de login:", loginData.message);
            errorMessage.textContent = "* " + loginData.message;
            errorMessage.classList.add("show");
          } else {
            console.error("❌ Error desconocido:", loginData);
            errorMessage.textContent = "* Error al iniciar sesión con Google";
            errorMessage.classList.add("show");
          }
        } catch (error) {
          console.error("Google Sign-In error:", error);
          errorMessage.textContent = "* Error al iniciar sesión con Google: " + error.message;
          errorMessage.classList.add("show");
        }
      }

      // Initialize Google Sign-In when page loads
      window.addEventListener("load", function () {
        try {
          google.accounts.id.initialize({
            client_id:
              "118582736340-9fnfvji5lcb77k5t3sjq101pta6dakaj.apps.googleusercontent.com",
            callback: handleCredentialResponse,
          });

          // Render the Google Sign-In button
          const googleBtn = document.getElementById("googleSignInBtn");
          if (googleBtn) {
            google.accounts.id.renderButton(googleBtn, {
              theme: "outline",
              size: "large",
              width: googleBtn.offsetWidth,
              text: "continue_with",
              locale: "es",
            });
          }
        } catch (error) {
          console.error("Error inicializando Google Sign-In:", error);
          console.log("Asegúrate de que el dominio está autorizado en Google Cloud Console");
        }
      });
    </script>
  </body>
</html>
