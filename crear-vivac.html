<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VivacWeb - Crear vivac</title>
    <link rel="stylesheet" href="dashboard-styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dashboard-main {
            background: linear-gradient(135deg, #f8f9fa 0%, #e8f5f0 100%);
            min-height: calc(100vh - 80px);
            padding: 40px 20px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 40px;
            font-size: 32px;
            background: linear-gradient(135deg, #2d7a4a, #1f5a35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-wrapper {
            position: relative;
            max-width: 700px;
            margin: 0 auto;
        }

        .form-wrapper::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #2d7a4a, #7dd3c0);
            border-radius: 50%;
            opacity: 0.1;
            z-index: 0;
        }

        .form-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(45, 122, 74, 0.1);
            border: 1px solid rgba(45, 122, 74, 0.1);
            position: relative;
            z-index: 1;
        }

        .form-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-header i {
            font-size: 28px;
            color: #2d7a4a;
        }

        .form-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            margin: 0;
        }

        @media (max-width: 768px) {
            .form-container {
                padding: 24px;
            }

            .section-title {
                font-size: 24px;
                margin-bottom: 30px;
            }

            .form-header {
                margin-bottom: 24px;
            }
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a1a;
            font-size: 14px;
        }

        .form-group label .required {
            color: #dc2626;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s;
            background-color: #fafafa;
        }

        .form-group input:hover,
        .form-group textarea:hover,
        .form-group select:hover {
            border-color: #2d7a4a;
            background-color: white;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2d7a4a;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(45, 122, 74, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2d7a4a, #1f5a35);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(45, 122, 74, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .upload-btn {
            background: linear-gradient(135deg, #2d7a4a, #1f5a35);
            color: white;
            padding: 12px 24px;
            border: 2px dashed #2d7a4a;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .upload-btn:hover {
            background: linear-gradient(135deg, #1f5a35, #0d3d23);
            border-color: #1f5a35;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(45, 122, 74, 0.2);
        }

        .photo-preview {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .photo-preview label {
            display: block;
            font-weight: 600;
            margin-bottom: 12px;
            color: #2d7a4a;
        }

        .photo-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
        }

        .photo-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: white;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }

        .photo-item:hover {
            border-color: #2d7a4a;
            box-shadow: 0 2px 8px rgba(45, 122, 74, 0.15);
        }

        .photo-item img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            display: block;
        }

        .photo-item .delete-photo-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(220, 38, 38, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s ease;
            opacity: 0;
        }

        .photo-item:hover .delete-photo-btn {
            opacity: 1;
        }

        .photo-item .delete-photo-btn:hover {
            background: rgba(220, 38, 38, 1);
            transform: scale(1.1);
        }

        .photo-item .file-name {
            padding: 8px;
            font-size: 11px;
            color: #666;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: #f8f9fa;
        }

        .form-info {
            background: linear-gradient(135deg, rgba(45, 122, 74, 0.05), rgba(125, 211, 192, 0.05));
            border-left: 4px solid #2d7a4a;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #555;
        }

        .form-info i {
            color: #2d7a4a;
            margin-right: 8px;
        }

        .form-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #2d7a4a;
            margin-right: 8px;
        }

        .form-group label[for="petFriendly"] {
            display: flex;
            align-items: center;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 0;
        }

        .form-group label[for="petFriendly"] span {
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-content">
                <div class="logo">
                    <img src="logo.svg" alt="Wild Spot" class="logo-img">
                </div>
                <nav class="header-nav">
                    <a href="dashboard.html" class="nav-link">Inicio</a>
                    <a href="explorar.html" class="nav-link">Explorar</a>
                    <a href="crear-vivac.html" class="nav-link active">Crear vivac</a>
                    <a href="comunidad.html" class="nav-link">Comunidad</a>
                    <a href="perfil.html" class="nav-link">Perfil</a>
                </nav>
                <div class="header-actions">
                    <a href="settings.html" class="icon-btn" title="Configuración">
                        <i class="fas fa-cog"></i>
                    </a>
                    <button class="icon-btn logout-btn" id="logoutBtn" title="Cerrar sesión">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                    <button class="menu-toggle" id="menuToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="dashboard-main">
            <h1 class="section-title">Crear un nuevo vivac</h1>

            <div class="form-wrapper">
                <div class="form-container">
                    <div class="form-header">
                        <i class="fas fa-map-marker-alt"></i>
                        <h2>Comparte tu descubrimiento</h2>
                    </div>

                    <div class="form-info">
                        <i class="fas fa-info-circle"></i>
                        Ayuda a la comunidad compartiendo nuevos sitios para hacer vivac. Completa todos los campos marcados con *.
                    </div>

                    <form id="createVivacForm">
                        <div class="form-group">
                            <label for="name">Nombre del sitio <span class="required">*</span></label>
                            <input type="text" id="name" name="name" placeholder="Ej: Mirador del Alto" required>
                        </div>

                        <div class="form-group">
                            <label for="description">Descripción <span class="required">*</span></label>
                            <textarea id="description" name="description" placeholder="Describe el sitio, acceso, vistas, etc..." required></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="latitude">Latitud <span class="required">*</span></label>
                                <input type="number" id="latitude" name="latitude" step="0.0001" placeholder="Ej: 38.5816" required>
                            </div>

                            <div class="form-group">
                                <label for="longitude">Longitud <span class="required">*</span></label>
                                <input type="number" id="longitude" name="longitude" step="0.0001" placeholder="Ej: -0.2169" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="elevation">Elevación (m)</label>
                                <input type="number" id="elevation" name="elevation" placeholder="Ej: 1200" min="0">
                            </div>

                            <div class="form-group">
                                <label for="accessDifficulty">Dificultad de acceso <span class="required">*</span></label>
                                <select id="accessDifficulty" name="accessDifficulty" required>
                                    <option value="">Seleccionar</option>
                                    <option value="EASY">🟢 Fácil</option>
                                    <option value="MODERATE">🟡 Moderado</option>
                                    <option value="HARD">🔴 Difícil</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Características del entorno</label>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px;">
                                <label style="display: flex; align-items: center; font-weight: 400; margin-bottom: 0;">
                                    <input type="checkbox" name="environment" value="PATH" style="margin-right: 8px;">
                                    🛤️ Sendero
                                </label>
                                <label style="display: flex; align-items: center; font-weight: 400; margin-bottom: 0;">
                                    <input type="checkbox" name="environment" value="BRIDGE" style="margin-right: 8px;">
                                    🌉 Puente
                                </label>
                                <label style="display: flex; align-items: center; font-weight: 400; margin-bottom: 0;">
                                    <input type="checkbox" name="environment" value="WATER_SOURCE" style="margin-right: 8px;">
                                    💧 Fuente de agua
                                </label>
                                <label style="display: flex; align-items: center; font-weight: 400; margin-bottom: 0;">
                                    <input type="checkbox" name="environment" value="CAVE" style="margin-right: 8px;">
                                    🕳️ Cueva
                                </label>
                                <label style="display: flex; align-items: center; font-weight: 400; margin-bottom: 0;">
                                    <input type="checkbox" name="environment" value="SHELTER" style="margin-right: 8px;">
                                    🏠 Refugio
                                </label>
                                <label style="display: flex; align-items: center; font-weight: 400; margin-bottom: 0;">
                                    <input type="checkbox" name="environment" value="TREE_AREA" style="margin-right: 8px;">
                                    🌲 Área de árboles
                                </label>
                                <label style="display: flex; align-items: center; font-weight: 400; margin-bottom: 0;">
                                    <input type="checkbox" name="environment" value="ROCK_WALL" style="margin-right: 8px;">
                                    🪨 Pared de roca
                                </label>
                                <label style="display: flex; align-items: center; font-weight: 400; margin-bottom: 0;">
                                    <input type="checkbox" name="environment" value="VIEWPOINT" style="margin-right: 8px;">
                                    👁️ Mirador
                                </label>
                                <label style="display: flex; align-items: center; font-weight: 400; margin-bottom: 0;">
                                    <input type="checkbox" name="environment" value="RUINS" style="margin-right: 8px;">
                                    🏛️ Ruinas
                                </label>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="terrainType">Tipo de terreno</label>
                                <select id="terrainType" name="terrainType">
                                    <option value="">Seleccionar</option>
                                    <option value="GRASS">🌱 Hierba</option>
                                    <option value="ROCKY">🪨 Rocoso</option>
                                    <option value="SAND">🏜️ Arena</option>
                                    <option value="GRAVEL">⛰️ Grava</option>
                                    <option value="DIRT">🌍 Tierra</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="petFriendly">
                                    <input type="checkbox" id="petFriendly" name="petFriendly">
                                    <span>🐕 Amigable con mascotas</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="photoInput">📸 Subir fotos</label>
                            <input type="file" id="photoInput" name="photos" multiple accept="image/*" style="display: none;">
                            <button type="button" class="upload-btn" onclick="document.getElementById('photoInput').click()">
                                <i class="fas fa-cloud-upload-alt"></i>
                                Seleccionar imágenes
                            </button>
                            <p style="font-size: 12px; color: #666; margin-top: 8px;">Puedes seleccionar múltiples imágenes</p>
                        </div>

                        <div id="photoPreview" class="photo-preview" style="display: none;">
                            <label>Imágenes seleccionadas:</label>
                            <div id="photoList" class="photo-list"></div>
                        </div>

                        <button type="submit" class="submit-btn">
                            <i class="fas fa-check-circle"></i>
                            Crear vivac
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="dashboard-script.js"></script>
    <script>
        // Almacenar archivos seleccionados
        let selectedFiles = [];

        // Manejar selección de archivos
        document.getElementById('photoInput').addEventListener('change', function(e) {
            selectedFiles = Array.from(e.target.files);
            updatePhotoPreview();
        });

        // Actualizar vista previa de fotos
        function updatePhotoPreview() {
            const photoPreview = document.getElementById('photoPreview');
            const photoList = document.getElementById('photoList');

            if (selectedFiles.length === 0) {
                photoPreview.style.display = 'none';
                return;
            }

            photoPreview.style.display = 'block';
            photoList.innerHTML = '';

            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const photoItem = document.createElement('div');
                    photoItem.className = 'photo-item';
                    photoItem.innerHTML = `
                        <img src="${e.target.result}" alt="${file.name}">
                        <button type="button" class="delete-photo-btn" onclick="deletePhoto(${index})" title="Eliminar">
                            <i class="fas fa-trash"></i>
                        </button>
                        <div class="file-name">${file.name}</div>
                    `;
                    photoList.appendChild(photoItem);
                };
                reader.readAsDataURL(file);
            });
        }

        // Eliminar foto
        function deletePhoto(index) {
            selectedFiles.splice(index, 1);
            updatePhotoPreview();
        }

        // Manejar envío del formulario
        document.getElementById('createVivacForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Obtener valores de environment (checkboxes)
            const environmentCheckboxes = document.querySelectorAll('input[name="environment"]:checked');
            const environment = Array.from(environmentCheckboxes).map(cb => cb.value);

            const formData = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                latitude: parseFloat(document.getElementById('latitude').value),
                longitude: parseFloat(document.getElementById('longitude').value),
                elevation: document.getElementById('elevation').value ? parseInt(document.getElementById('elevation').value) : null,
                accessDifficulty: document.getElementById('accessDifficulty').value,
                environment: environment,
                terrainType: document.getElementById('terrainType').value || null,
                petFriendly: document.getElementById('petFriendly').checked,
                photoUrls: []
            };

            try {
                const token = localStorage.getItem('vivacweb_token');

                console.log('🔑 Token:', token ? token.substring(0, 20) + '...' : 'No token found');
                console.log('📋 Form data:', formData);
                console.log('📸 Archivos seleccionados:', selectedFiles.length);

                if (!token) {
                    alert('No hay sesión activa. Por favor, inicia sesión primero.');
                    window.location.href = 'login.html';
                    return;
                }

                // Verificar que el token sea válido
                if (token.split('.').length !== 3) {
                    console.error('❌ Token inválido (no es un JWT válido)');
                    alert('Token inválido. Por favor, inicia sesión nuevamente.');
                    localStorage.clear();
                    window.location.href = 'login.html';
                    return;
                }

                console.log('✅ Token válido (JWT con 3 partes)');

                // Usar proxy local en desarrollo
                const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                    ? 'http://localhost:3001'
                    : 'https://vivac-backend-production.up.railway.app';

                const headers = {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                };

                console.log('📤 Enviando solicitud a:', API_URL + '/vivacs');

                // 1. Crear el vivac
                const response = await fetch(API_URL + '/vivacs', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(formData)
                });

                console.log('📥 Response status:', response.status);
                const data = await response.json();
                console.log('📥 Response data:', data);

                if (!response.ok) {
                    alert('Error al crear el vivac: ' + (data.message || 'Error desconocido'));
                    console.error('❌ Error response:', data);
                    return;
                }

                const vivacId = data.id;
                console.log('✅ Vivac creado con ID:', vivacId);

                // 2. Subir fotos si existen
                if (selectedFiles.length > 0) {
                    console.log('📸 Subiendo', selectedFiles.length, 'foto(s) a Cloudinary...');
                    console.log('📸 Vivac ID:', vivacId);

                    try {
                        const photoUrls = [];

                        // Subir cada foto a Cloudinary
                        for (let i = 0; i < selectedFiles.length; i++) {
                            const file = selectedFiles[i];
                            console.log(`📸 Subiendo archivo ${i + 1}/${selectedFiles.length}:`, file.name);

                            const photoFormData = new FormData();
                            photoFormData.append('file', file);

                            const uploadUrl = API_URL + '/images/upload';
                            console.log('📸 URL de upload:', uploadUrl);

                            const uploadResponse = await fetch(uploadUrl, {
                                method: 'POST',
                                headers: {
                                    'Authorization': `Bearer ${token}`
                                },
                                body: photoFormData
                            });

                            console.log(`📸 Upload response status (${i + 1}):`, uploadResponse.status);
                            const uploadText = await uploadResponse.text();
                            console.log(`📸 Upload response text (${i + 1}):`, uploadText);

                            if (!uploadResponse.ok) {
                                console.warn(`⚠️ Error al subir foto ${i + 1}`);
                                continue;
                            }

                            try {
                                const uploadData = JSON.parse(uploadText);
                                console.log(`📸 Upload response JSON (${i + 1}):`, uploadData);

                                if (uploadData.url) {
                                    photoUrls.push(uploadData.url);
                                    console.log(`✅ Foto ${i + 1} subida: ${uploadData.url}`);
                                }
                            } catch (e) {
                                console.warn(`⚠️ No se pudo parsear respuesta de upload ${i + 1}:`, uploadText);
                            }
                        }

                        // 3. Actualizar el vivac con las URLs de las fotos
                        if (photoUrls.length > 0) {
                            console.log('📸 Actualizando vivac con URLs de fotos:', photoUrls);

                            const updateData = {
                                photoUrls: photoUrls
                            };

                            const updateResponse = await fetch(API_URL + `/vivacs/${vivacId}`, {
                                method: 'PATCH',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${token}`
                                },
                                body: JSON.stringify(updateData)
                            });

                            console.log('📸 Update response status:', updateResponse.status);
                            const updateText = await updateResponse.text();
                            console.log('📸 Update response text:', updateText);

                            if (updateResponse.ok) {
                                console.log('✅ Vivac actualizado con fotos exitosamente');
                            } else {
                                console.warn('⚠️ Error al actualizar vivac con fotos');
                            }
                        }
                    } catch (photoError) {
                        console.error('❌ Error al subir fotos:', photoError);
                        console.warn('⚠️ Vivac creado pero hubo error al subir fotos');
                    }
                }

                alert('¡Vivac creado exitosamente!');
                document.getElementById('createVivacForm').reset();
                selectedFiles = [];
                updatePhotoPreview();

                setTimeout(() => {
                    window.location.href = 'explorar.html';
                }, 1500);

            } catch (error) {
                console.error('❌ Error:', error);
                alert('Error al crear el vivac: ' + error.message);
            }
        });
    </script>
</body>
</html>
