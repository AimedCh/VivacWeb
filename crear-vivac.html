<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VivacWeb - Crear vivac</title>
    <link rel="stylesheet" href="dashboard-styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dashboard-main {
            background: linear-gradient(135deg, #f8f9fa 0%, #e8f5f0 100%);
            min-height: calc(100vh - 80px);
            padding: 40px 20px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 40px;
            font-size: 32px;
            background: linear-gradient(135deg, #2d7a4a, #1f5a35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-wrapper {
            position: relative;
            max-width: 700px;
            margin: 0 auto;
        }

        .form-wrapper::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #2d7a4a, #7dd3c0);
            border-radius: 50%;
            opacity: 0.1;
            z-index: 0;
        }

        .form-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(45, 122, 74, 0.1);
            border: 1px solid rgba(45, 122, 74, 0.1);
            position: relative;
            z-index: 1;
        }

        .form-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-header i {
            font-size: 28px;
            color: #2d7a4a;
        }

        .form-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            margin: 0;
        }

        @media (max-width: 768px) {
            .form-container {
                padding: 24px;
            }

            .section-title {
                font-size: 24px;
                margin-bottom: 30px;
            }

            .form-header {
                margin-bottom: 24px;
            }
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a1a;
            font-size: 14px;
        }

        .form-group label .required {
            color: #dc2626;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s;
            background-color: #fafafa;
        }

        .form-group input:hover,
        .form-group textarea:hover,
        .form-group select:hover {
            border-color: #2d7a4a;
            background-color: white;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2d7a4a;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(45, 122, 74, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2d7a4a, #1f5a35);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(45, 122, 74, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .form-info {
            background: linear-gradient(135deg, rgba(45, 122, 74, 0.05), rgba(125, 211, 192, 0.05));
            border-left: 4px solid #2d7a4a;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #555;
        }

        .form-info i {
            color: #2d7a4a;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-content">
                <div class="logo">
                    <img src="logo.svg" alt="Wild Spot" class="logo-img">
                </div>
                <nav class="header-nav">
                    <a href="dashboard.html" class="nav-link">Inicio</a>
                    <a href="explorar.html" class="nav-link">Explorar</a>
                    <a href="crear-vivac.html" class="nav-link active">Crear vivac</a>
                    <a href="comunidad.html" class="nav-link">Comunidad</a>
                    <a href="perfil.html" class="nav-link">Perfil</a>
                </nav>
                <div class="header-actions">
                    <a href="settings.html" class="icon-btn" title="Configuración">
                        <i class="fas fa-cog"></i>
                    </a>
                    <button class="icon-btn logout-btn" id="logoutBtn" title="Cerrar sesión">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                    <button class="menu-toggle" id="menuToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="dashboard-main">
            <h1 class="section-title">Crear un nuevo vivac</h1>

            <div class="form-wrapper">
                <div class="form-container">
                    <div class="form-header">
                        <i class="fas fa-map-marker-alt"></i>
                        <h2>Comparte tu descubrimiento</h2>
                    </div>

                    <div class="form-info">
                        <i class="fas fa-info-circle"></i>
                        Ayuda a la comunidad compartiendo nuevos sitios para hacer vivac. Completa todos los campos marcados con *.
                    </div>

                    <form id="createVivacForm">
                        <div class="form-group">
                            <label for="name">Nombre del sitio <span class="required">*</span></label>
                            <input type="text" id="name" name="name" placeholder="Ej: Mirador del Alto" required>
                        </div>

                        <div class="form-group">
                            <label for="location">Localización <span class="required">*</span></label>
                            <input type="text" id="location" name="location" placeholder="Ej: Tibi, España" required>
                        </div>

                        <div class="form-group">
                            <label for="description">Descripción</label>
                            <textarea id="description" name="description" placeholder="Describe el sitio, acceso, vistas, etc..."></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="latitude">Latitud <span class="required">*</span></label>
                                <input type="number" id="latitude" name="latitude" step="0.0001" placeholder="Ej: 38.5816" required>
                            </div>

                            <div class="form-group">
                                <label for="longitude">Longitud <span class="required">*</span></label>
                                <input type="number" id="longitude" name="longitude" step="0.0001" placeholder="Ej: -0.2169" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="category">Categoría</label>
                            <select id="category" name="category">
                                <option value="">Seleccionar categoría</option>
                                <option value="Playa">🏖️ Playa</option>
                                <option value="Montaña">⛰️ Montaña</option>
                                <option value="Bosque">🌲 Bosque</option>
                                <option value="Desierto">🏜️ Desierto</option>
                                <option value="Otro">📍 Otro</option>
                            </select>
                        </div>

                        <button type="submit" class="submit-btn">
                            <i class="fas fa-check-circle"></i>
                            Crear vivac
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="dashboard-script.js"></script>
    <script>
        document.getElementById('createVivacForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value,
                location: document.getElementById('location').value,
                description: document.getElementById('description').value,
                latitude: parseFloat(document.getElementById('latitude').value),
                longitude: parseFloat(document.getElementById('longitude').value),
                category: document.getElementById('category').value,
                image_url: 'https://via.placeholder.com/400x300',
                rating: 0,
                reviews_count: 0
            };

            try {
                const response = await fetch('http://localhost/400web/api/public/api/locations', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();
                
                if (response.ok) {
                    alert('¡Vivac creado exitosamente!');
                    document.getElementById('createVivacForm').reset();
                    setTimeout(() => {
                        window.location.href = 'explorar.html';
                    }, 1000);
                } else {
                    alert('Error al crear el vivac: ' + (data.message || 'Error desconocido'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error al crear el vivac');
            }
        });
    </script>
</body>
</html>
