<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VivacWeb - Explorar</title>
    <link rel="stylesheet" href="dashboard-styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-content">
                <div class="logo">
                    <span class="star">★</span>
                    <span class="logo-text">LOGO</span>
                </div>
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </header>

        <!-- Sidebar Menu -->
        <aside class="sidebar" id="sidebar">
            <button class="close-menu" id="closeMenu">
                <i class="fas fa-times"></i>
            </button>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Inicio</span>
                </a>
                <a href="explorar.html" class="nav-item active">
                    <i class="fas fa-globe"></i>
                    <span>Explorar</span>
                </a>
                <a href="crear-vivac.html" class="nav-item">
                    <i class="fas fa-flag"></i>
                    <span>Crear vivac</span>
                </a>
                <a href="comunidad.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Comunidad</span>
                </a>
                <a href="perfil.html" class="nav-item">
                    <i class="fas fa-user-circle"></i>
                    <span>Perfil</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="settings.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
                <button class="nav-item logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Log out</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <div class="search-section">
                <h1 class="section-title">Explorar sitios</h1>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" placeholder="Buscar una localización...">
                </div>
                <div class="view-controls">
                    <button class="control-btn" id="mapViewBtn">
                        <i class="fas fa-map"></i>
                        <span>Ver mapa</span>
                    </button>
                    <button class="control-btn" id="filterBtn">
                        <i class="fas fa-sliders-h"></i>
                        <span>Filtros</span>
                    </button>
                </div>
            </div>

            <!-- Map Container -->
            <div class="map-container" id="mapContainer" style="display: none;">
                <div id="map"></div>
            </div>

            <!-- Locations Grid -->
            <section class="locations-section">
                <div class="section-header">
                    <h2>Todos los sitios</h2>
                </div>
                <div class="locations-grid" id="locationsGrid">
                    <!-- Cargado dinámicamente -->
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="dashboard-script.js"></script>
    <script>
        // Cargar ubicaciones desde API
        async function loadLocations() {
            try {
                const response = await fetch('http://localhost/400web/api/public/api/locations');
                const locations = await response.json();
                
                const grid = document.getElementById('locationsGrid');
                grid.innerHTML = '';
                
                if (locations.length === 0) {
                    grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999;">No hay sitios disponibles</p>';
                    return;
                }
                
                locations.forEach((location, index) => {
                    const card = document.createElement('div');
                    card.className = 'location-card';
                    card.innerHTML = `
                        <div class="card-image">
                            <img src="${location.image_url || 'https://via.placeholder.com/400x300'}" alt="${location.name}">
                            <button class="favorite-btn">
                                <i class="far fa-heart"></i>
                            </button>
                        </div>
                        <div class="card-content">
                            <h3>${location.name}</h3>
                            <p class="location-name">${location.location}</p>
                            <div class="rating">
                                <i class="fas fa-star"></i>
                                <span>${location.rating}</span>
                                <span class="reviews">${location.reviews_count} reviews</span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                
                initializeFavorites();
            } catch (error) {
                console.error('Error cargando ubicaciones:', error);
            }
        }
        
        window.addEventListener('load', loadLocations);
    </script>
</body>
</html>
